<section class="main-content">
  <ul class="breadcrumb breadcrumb-style ">
    <li class="breadcrumb-item">
      <h5 class="page-title m-b-0">Dashboard</h5>
    </li>
    <li class="breadcrumb-item bcrumb-1">
      <a routerLink="/dashboard/main">
        <i class="fas fa-home font-17"></i></a>
    </li>
    <li class="breadcrumb-item">Tableau de Bord</li>
  </ul>
  <div class="section-body">
    <div class="row ">
      <div class="col-xl-3 col-lg-6 col-md-6 col-sm-6 col-xs-12">
        <div class="card">
          <div class="card-statistic-4">
            <div class="align-items-center justify-content-between">
              <div class="row ">
                <div class="col-lg-6 col-md-6 col-sm-6 col-xs-6 left-grid-spacing">
                  <div class="card-content">
                    <h6>Activité Total</h6>
                    <h2 class="mb-3 font-18">{{ nombreActivite }}</h2>
<!--                    <p class="mb-0"><span class="col-green">42%</span></p>-->
                  </div>
<!--                  <ngb-progressbar type="success" [value]="42" height=".3rem"></ngb-progressbar>-->
                </div>
                <div class="col-lg-6 col-md-6 col-sm-6 col-xs-6 right-grid-spacing">
                  <div class="banner-img">
                    <img src="assets/images/activitetotal.png" alt="">
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
      <div class="col-xl-3 col-lg-6 col-md-6 col-sm-6 col-xs-12">
        <div class="card">
          <div class="card-statistic-4">
            <div class="align-items-center justify-content-between">
              <div class="row ">
                <div class="col-lg-6 col-md-6 col-sm-6 col-xs-6 left-grid-spacing">
                  <div class="card-content">
                    <h6> Activité en cours</h6>
                    <h2 class="mb-3 font-18">{{ nombreActiviteEncours }}</h2>
<!--                    <p class="mb-0"><span class="col-orange">33%</span></p>-->
                  </div>
<!--                  <ngb-progressbar type="warning" [value]="33" height=".3rem"></ngb-progressbar>-->
                </div>
                <div class="col-lg-6 col-md-6 col-sm-6 col-xs-6 right-grid-spacing">
                  <div class="banner-img">
                    <img src="assets/images/activiteencours.png" alt="">
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
      <div class="col-xl-3 col-lg-6 col-md-6 col-sm-6 col-xs-12">
        <div class="card">
          <div class="card-statistic-4">
            <div class="align-items-center justify-content-between">
              <div class="row ">
                <div class="col-lg-6 col-md-6 col-sm-6 col-xs-6 left-grid-spacing">
                  <div class="card-content">
                    <h6>Activité en attente</h6>
                    <h2 class="mb-3 font-18">{{ nombreActiviteEnAttente }}</h2>
<!--                    <p class="mb-0"><span class="col-blue">25%</span>-->
<!--                    </p>-->
                  </div>
<!--                  <ngb-progressbar type="info" [value]="25" height=".3rem"></ngb-progressbar>-->
                </div>
                <div class="col-lg-6 col-md-6 col-sm-6 col-xs-6 right-grid-spacing">
                  <div class="banner-img">
                    <img src="assets/images/activiteattente.png" alt="">
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
      <div class="col-xl-3 col-lg-6 col-md-6 col-sm-6 col-xs-12">
        <div class="card">
          <div class="card-statistic-4">
            <div class="align-items-center justify-content-between">
              <div class="row ">
                <div class="col-lg-6 col-md-6 col-sm-6 col-xs-6 left-grid-spacing">
                  <div class="card-content">
                    <h6>Actitivé terminer</h6>
                    <h2 class="mb-3 font-18">{{ nombreActiviteTerminer }}</h2>
<!--                    <p class="mb-0"><span class="col-red">65%</span></p>-->
                  </div>
<!--                  <ngb-progressbar type="danger" [value]="65" height=".3rem"></ngb-progressbar>-->
                </div>
                <div class="col-lg-6 col-md-6 col-sm-6 col-xs-6 right-grid-spacing">
                  <div class="banner-img">
                    <img src="assets/images/activiteterminer.png" alt="">
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
      <!-- <div class="col-xl-3 col-lg-6 col-md-6 col-sm-6 col-xs-12">
        <div class="card">
          <div class="card-statistic-4">
            <div class="align-items-center justify-content-between">
              <div class="row ">
                <div class="col-lg-6 col-md-6 col-sm-6 col-xs-6 left-grid-spacing">
                  <div class="card-content">
                    <h6>Nombre personnels</h6>
                    <h2 class="mb-3 font-18">{{ nombreUtilisateurs }}</h2>
                  </div>
                </div>
                <div class="col-lg-6 col-md-6 col-sm-6 col-xs-6 right-grid-spacing">
                  <div class="banner-img">
                    <img src="assets/images/usertotal.png" alt="">
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div> -->
    </div>
   
    <div>  
   <form [formGroup]="formCriteres">
    <div class="row g-3 mb-4"> 
  <!-- Filtre par Entité -->
  <div class="col-md-3">
    <label for="entite" class="form-label">Entité</label>
    <!-- (change)="applyFilters()" -->
    <select id="entite" class="form-select form-control" formControlName="selectedEntite"(change)="onEntiteChange()" >
      <option value="">Toutes les entités</option>
      <ng-container *ngFor="let e of entites">
        <option [value]="e.id">{{ e.nom }}</option>
      </ng-container>
    </select>
  </div>
<!-- Filtre par Activité -->
    <div class="col-md-3">
    <label for="activite" class="form-label">Activité</label>
    <select id="activite" class="form-select form-control" formControlName="selectedActivite" (change)="onActiviteChange()">
      <option value="">Toutes les activités</option>
      <ng-container *ngFor="let a of filteredActivites">
        <option [value]="a.id">{{ a.nom }}</option>
      </ng-container>
     </select>
    <!-- <select class="form-select form-control" formControlName="selectedActivite" (change)="applyFilters()" >
    <option value="" [ngValue]="null" disabled>-- Toutes les activités --</option>
    <option *ngFor="let activite of activites"  [value]="activite.id">{{activite.nom}}</option>
    </select>  -->
  </div>

  <!-- Filtre par Etape -->
    <div class="col-md-3">
    <label for="etape" class="form-label">Etape</label>
    <select id="etape" class="form-select form-control" formControlName="selectedEtape" (change)="applyFilters()">
      <option value="">Toutes les etapes</option>
      <ng-container *ngFor="let e of filteredEtapes">
        <option [value]="e.id">{{ e.nom }}</option>
      </ng-container>
     </select>
   
  </div>
  <!-- Filtre Date début -->
  <div class="col-md-3">
    <label class="form-label">Date début</label>
    <input type="date" class="form-control" formControlName="dateDebut" (change)="applyFilters()" />
  </div>

  <!-- Filtre Date fin -->
  <div class="col-md-3">
    <label class="form-label">Date fin</label>
    <input type="date" class="form-control" formControlName="dateFin" (change)="applyFilters()" />
  </div>
 </div> 
  </form>
</div>

<!-- CHART -->
<div class="row">
  <div class="col-md-12 col-lg-6 col-xl-6">
    <div class="card">
      <div class="card-header">
        <h4>Statistique des participants</h4>
      </div>

      <div class="card-body">
        <apx-chart
          [series]="barChartOptions.series!"
          [chart]="barChartOptions.chart!"
          [dataLabels]="barChartOptions.dataLabels!"
          [stroke]="barChartOptions.stroke!"
          [colors]="barChartOptions.colors!"
          [title]="barChartOptions.title!"
          [grid]="barChartOptions.grid!"
          [tooltip]="barChartOptions.tooltip!"
          [plotOptions]="barChartOptions.plotOptions!"
          [yaxis]="barChartOptions.yaxis!"
          [xaxis]="barChartOptions.xaxis!"
        >
        </apx-chart>
      </div>
    </div>
  </div>
</div>
  </div>
</section>

<main class="signin-odl">
  <div class="signin-odl__bg"></div>
  <div class="signin-odl__card-wrapper">
    <div class="signin-odl__card">
      <div class="signin-odl__header">
        <img src="assets/images/logo9.png" alt="ODC" class="signin-odl__logo">
        <h1 class="signin-odl__title">Connexion</h1>
        <p class="signin-odl__subtitle">Connectez-vous pour accéder à votre espace</p>
      </div>
      <form class="signin-odl__form" [formGroup]="loginForm" (ngSubmit)="onSubmit()">
        <div class="signin-odl__field">
          <label for="email">Adresse email</label>
          <div class="signin-odl__input-wrap">
            <i-feather name="mail" class="signin-odl__icon"></i-feather>
            <input id="email" type="email" class="signin-odl__input" formControlName="username"
                   placeholder="ex: utilisateur@exemple.com" autocomplete="email">
          </div>
          <ng-container *ngIf="loginForm.get('username')?.touched && loginForm.get('username')?.invalid">
            <small class="signin-odl__error" *ngIf="loginForm.get('username')?.errors?.['required']">L'email est requis.</small>
            <small class="signin-odl__error" *ngIf="loginForm.get('username')?.errors?.['email']">Format d'email invalide.</small>
          </ng-container>
        </div>
        <div class="signin-odl__field">
          <label for="password">Mot de passe</label>
          <div class="signin-odl__input-wrap">
            <i-feather name="lock" class="signin-odl__icon"></i-feather>
            <input id="password" [type]="showPassword ? 'text' : 'password'" class="signin-odl__input" formControlName="password"
                   placeholder="••••••••" autocomplete="current-password">
            <button type="button" class="signin-odl__eye" (click)="showPassword = !showPassword" aria-label="Afficher mot de passe">
              <i-feather [name]="showPassword ? 'eye-off' : 'eye'"></i-feather>
            </button>
          </div>
          <ng-container *ngIf="loginForm.get('password')?.touched && loginForm.get('password')?.invalid">
            <small class="signin-odl__error" *ngIf="loginForm.get('password')?.errors?.['required']">Le mot de passe est requis.</small>
            <small class="signin-odl__error" *ngIf="loginForm.get('password')?.errors?.['minlength']">Minimum 6 caractères.</small>
          </ng-container>
        </div>
        <div class="signin-odl__options">
          <label class="signin-odl__remember">
            <input type="checkbox" formControlName="remember">
            <span>Se souvenir de moi</span>
          </label>
          <a routerLink="/authentication/forgot" class="signin-odl__forgot">Mot de passe oublié ?</a>
        </div>
        @if (error) {
          <div class="signin-odl__alert">{{ error }}</div>
        }
        <button type="submit" class="signin-odl__btn" [disabled]="loginForm.invalid">
          <i-feather name="log-in"></i-feather>
          <span>Se connecter</span>
        </button>
      </form>
    </div>
  </div>
</main>
